version: '3.8'

services:
  # Servei Base de Dades - MongoDB
  joc-mongodb:
    image: mongo:latest
    container_name: joc-mongodb
    ports:
      - "27017:27017" # Expost per si vols fer debug des de fora
    volumes:
      - mongodb_data:/data/db
    networks:
      - joc-network
    restart: unless-stopped

  # Servei Backend - Node.js
  joc-backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: joc-backend
    ports:
      - "3000:3000" # Expost directament com a fallback
    env_file:        
      - server/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - joc-mongodb
    networks:
      - joc-network
    restart: unless-stopped

  # Proxy Invers Nginx
  nginx:
    image: nginx:latest
    container_name: joc-nginx
    ports:
      - "8080:8080" # Port principal de comunicació
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - joc-backend
    networks:
      - joc-network
    restart: always

networks:
  joc-network:
    driver: bridge

volumes:
  mongodb_data:
