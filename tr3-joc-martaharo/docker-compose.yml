version: '3.8'

services:
  # Servei Backend - Node.js
  joc-backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: joc-backend
    ports:
      - "3000:3000"
    env_file:        
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URL=mongodb://joc-mongodb:27017/martadb  
    depends_on:
      - joc-mongodb
    networks:
      - joc-network
    restart: unless-stopped

  # Proxy Invers Nginx
  nginx:
    image: nginx:latest
    container_name: joc-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - joc-backend
    networks:
      - joc-network
    restart: unless-stopped

# Servei Base de Dades - MongoDB
  joc-mongodb:
    image: mongo:latest
    container_name: joc-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      joc-network:
        aliases:
          - mongo    
    restart: unless-stopped

networks:
  joc-network:
    driver: bridge

volumes:
  mongodb_data:
