version: '3.8'

services:
  # Servei Backend - Node.js
  joc-backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: joc-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - joc-network
    restart: unless-stopped

  # Proxy Invers Nginx
  nginx:
    image: nginx:latest
    container_name: joc-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - joc-backend
    networks:
      - joc-network
    restart: unless-stopped

networks:
  joc-network:
    driver: bridge
